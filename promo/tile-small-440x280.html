<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navi — Small Promo Tile 440×280</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{
  width:440px;height:280px;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",system-ui,sans-serif;
}
body{
  background:
    radial-gradient(480px 360px at 85% -15%, rgba(40,100,240,.60),transparent 55%),
    radial-gradient(480px 420px at -10% 90%, rgba(120,55,235,.52),transparent 55%),
    radial-gradient(340px 300px at 55% 110%, rgba(22,188,200,.28),transparent 55%),
    #060810;
  display:flex;align-items:center;justify-content:space-between;
  padding:32px 28px 28px;
}

/* LEFT: wordmark + tagline */
.left{display:flex;flex-direction:column;justify-content:space-between;height:100%}
.wordmark{
  font-size:28px;font-weight:800;letter-spacing:-.8px;
  background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.55));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.wordmark span{
  background:linear-gradient(135deg,#0a84ff,#bf5af2);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.tag{
  font-size:13px;font-weight:500;color:rgba(255,255,255,.62);
  line-height:1.55;margin-top:8px;
}
.pills{display:flex;flex-direction:column;gap:7px;margin-top:auto}
.pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:999px;padding:5px 12px;
  font-size:11px;font-weight:600;color:rgba(255,255,255,.85);
  width:fit-content;
}
.pill .dot{width:6px;height:6px;border-radius:50%}

/* RIGHT: mini widget stack */
.widgets{display:flex;flex-direction:column;gap:8px;flex:none}
.w{
  border-radius:16px;overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.045));
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(20px);
  box-shadow:0 8px 24px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.22);
  padding:10px 12px;
}
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column}

/* clock widget */
.clock-w{width:170px}
.clk-row{display:flex;align-items:center;justify-content:space-between}
.clk-time{font-size:22px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.clk-sub{font-size:9.5px;color:rgba(255,255,255,.5);margin-top:1px}
.clk-face{width:36px;height:36px;flex:none}

/* cal widget */
.cal-w{width:170px}
.cal-hdr{font-size:10px;font-weight:700;margin-bottom:6px;color:rgba(255,255,255,.9)}
.ev{display:flex;gap:6px;margin-top:5px}
.ev .bar{width:3px;border-radius:2px;align-self:stretch}
.ev .en{font-size:10px;font-weight:600;color:rgba(255,255,255,.88)}
.ev .et{font-size:9px;color:rgba(255,255,255,.5)}

/* weather */
.wx-w{width:170px;background:linear-gradient(145deg,#1f88ff,#0a5fe0);border-color:transparent}
.wx-temp{font-size:26px;font-weight:700;letter-spacing:-1px}
.wx-lbl{font-size:9.5px;color:rgba(255,255,255,.75)}
</style>
</head>
<body>

<!-- LEFT -->
<div class="left">
  <div>
    <div class="wordmark">Navi<span>.</span></div>
    <div class="tag">Your new tab,<br>reimagined.</div>
  </div>
  <div class="pills">
    <div class="pill"><div class="dot" style="background:#0a84ff"></div>30+ Widgets</div>
    <div class="pill"><div class="dot" style="background:#30d158"></div>Google Calendar & Tasks</div>
    <div class="pill"><div class="dot" style="background:#bf5af2"></div>Drag-free layout</div>
  </div>
</div>

<!-- RIGHT: widget previews -->
<div class="widgets">

  <!-- Clock -->
  <div class="w clock-w">
    <div class="clk-row">
      <div>
        <div class="clk-time" id="ct">10:24</div>
        <div class="clk-sub">New York · AM</div>
      </div>
      <svg class="clk-face" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="16" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
        <line id="hh" x1="18" y1="18" x2="18" y2="10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <line id="mh" x1="18" y1="18" x2="18" y2="6"  stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
        <line id="sh" x1="18" y1="18" x2="18" y2="5"  stroke="#ff453a" stroke-width="1" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="1.6" fill="#fff"/>
      </svg>
    </div>
  </div>

  <!-- Calendar -->
  <div class="w cal-w">
    <div class="cal-hdr">Calendar</div>
    <div class="ev"><div class="bar" style="background:#0a84ff"></div><div><div class="et">9:00 AM</div><div class="en">Team Standup</div></div></div>
    <div class="ev"><div class="bar" style="background:#30d158"></div><div><div class="et">1:00 PM</div><div class="en">Lunch · Sarah</div></div></div>
    <div class="ev"><div class="bar" style="background:#bf5af2"></div><div><div class="et">5:00 PM</div><div class="en">Team Sync</div></div></div>
  </div>

  <!-- Weather -->
  <div class="w wx-w">
    <div class="row" style="justify-content:space-between">
      <div>
        <div class="wx-lbl">San Francisco</div>
        <div class="wx-temp">68°</div>
        <div style="font-size:9.5px;font-weight:600;margin-top:2px">Sunny · Feels 65°</div>
      </div>
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="9" r="3.5" fill="#ffd60a"/>
        <g stroke="#ffe680" stroke-width="1.4" stroke-linecap="round">
          <path d="M9 2v1.5M9 14.5V16M2 9h1.5M14.5 9H16M4 4l1 1M13 13l1 1M14 4l-1 1M5 13l-1 1"/>
        </g>
      </svg>
    </div>
  </div>

</div>

<script>
function tick(){
  const now=new Date(),h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  const p=n=>String(n).padStart(2,'0');
  const hh=h%12||12;
  document.getElementById('ct').textContent=p(hh)+':'+p(m);
  const rot=(id,deg)=>{
    const el=document.getElementById(id); if(!el) return;
    const [x1,y1,x2,y2]=[18,18,...[id==='hh'?[18,10]:id==='mh'?[18,6]:[18,5]][0]];
    const a=deg*Math.PI/180;
    const dx=-(x2-x1)*Math.sin(a-Math.PI)+(y2-y1)*Math.cos(a-Math.PI);
    const dy=(x2-x1)*Math.cos(a-Math.PI)+(y2-y1)*Math.sin(a-Math.PI);
    el.setAttribute('x2',18+dx); el.setAttribute('y2',18+dy);
  };
  rot('hh',(h%12+m/60)*30); rot('mh',(m+s/60)*6); rot('sh',s*6);
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
